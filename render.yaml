services:
  - type: web
    name: mediator-on-call
    runtime: python
    buildCommand: |
      pip install -r requirements.txt
      python manage.py migrate --noinput
      python manage.py shell -c "
import os
print('DATABASE_URL:', 'SET' if os.environ.get('DATABASE_URL') else 'NOT SET')
from django.contrib.auth import get_user_model
from disputes.models import Mediator
User = get_user_model()
for uname, email, first, last, pw in [('frankstanley','frank@probonomediation.co.za','Frank','Stanley','FrankStanley2026!'), ('JVW','jvw@probonomediation.co.za','','','JVW123')]:
    u, _ = User.objects.get_or_create(username=uname, defaults={'email':email,'first_name':first,'last_name':last,'is_staff':True,'is_active':True})
    u.set_password(pw)
    u.save()
    Mediator.objects.get_or_create(user=u, defaults={'cell':'0000000000'})
print('Users created')
      "
      python manage.py collectstatic --noinput --clear
    startCommand: |
      python manage.py migrate --noinput
      exec gunicorn mediators_on_call.wsgi --bind 0.0.0.0:${PORT:-10000} --workers 1 --timeout 120
    healthCheckPath: /health/
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.0"
      - key: DJANGO_SETTINGS_MODULE
        value: "mediators_on_call.settings"
      - key: DEBUG
        value: "False"
      - key: DATABASE_URL
        fromDatabase:
          name: mediator-on-call-db
          property: connectionString
    databases:
      - name: mediator-on-call-db
        databaseName: mediators_on_call
        user: mediators_on_call
        plan: free
