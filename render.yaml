services:
  - type: web
    name: mediator-on-call
    runtime: python
    buildCommand: |
      python manage.py migrate --noinput
      python manage.py shell << 'PYEOF'
      from django.contrib.auth import get_user_model
      from disputes.models import Mediator
      User = get_user_model()
      # Delete and recreate frankstanley
      User.objects.filter(username='frankstanley').delete()
      user = User.objects.create_superuser(username='frankstanley', email='frank@probonomediation.co.za', password='FrankStanley2026!')
      user.first_name = 'Frank'
      user.last_name = 'Stanley'
      user.is_staff = True
      user.is_superuser = True
      user.is_active = True
      user.save()
      mediator, created = Mediator.objects.get_or_create(user=user, defaults={'cell': '0821234567'})
      print("="*40)
      print("FRANK STANLEY ACCOUNT READY")
      print("Username: frankstanley")
      print("Password: FrankStanley2026!")
      print("Role: Admin + Mediator")
      print("="*40)
      PYEOF
      python manage.py collectstatic --noinput --clear
    startCommand: gunicorn mediators_on_call.wsgi --bind 0.0.0.0:10000 --config gunicorn.conf.py
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.0"
