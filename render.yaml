services:
  - type: web
    name: mediator-on-call
    runtime: python
    buildCommand: |
      pip install -r requirements.txt
      python manage.py migrate --noinput
      python manage.py shell -c "
from django.contrib.auth import get_user_model
from disputes.models import Mediator
User = get_user_model()
user, _ = User.objects.get_or_create(username='frankstanley', defaults={'email':'frank@probonomediation.co.za','first_name':'Frank','last_name':'Stanley','is_staff':True,'is_active':True})
user.set_password('FrankStanley2026!')
user.save()
Mediator.objects.get_or_create(user=user, defaults={'cell':'0821234567'})
jvw, _ = User.objects.get_or_create(username='JVW', defaults={'email':'jvw@probonomediation.co.za','is_staff':True,'is_active':True})
jvw.set_password('JVW123')
jvw.save()
Mediator.objects.get_or_create(user=jvw, defaults={'cell':'0000000000'})
print('Users ready')
      "
      python manage.py collectstatic --noinput --clear
    startCommand: gunicorn mediators_on_call.wsgi --bind 0.0.0.0:${PORT:-10000} --workers 1 --timeout 120
    healthCheckPath: /health/
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.0"
      - key: DJANGO_SETTINGS_MODULE
        value: "mediators_on_call.settings"
      - key: DEBUG
        value: "True"
      - key: DATABASE_URL
        fromDatabase:
          name: mediator-on-call-db
          property: connectionString

databases:
  - name: mediator-on-call-db
    databaseName: mediators_on_call
    user: mediators_on_call
    plan: free
