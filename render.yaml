services:
  - type: web
    name: mediator-on-call
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: bash start.sh
    healthCheckPath: /health/
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.0"
      - key: DJANGO_SETTINGS_MODULE
        value: "mediators_on_call.settings"
      - key: DEBUG
        value: "True"
      - key: DJANGO_SECRET_KEY
        value: "render-temp-secret-key-change-later"
