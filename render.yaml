services:
  - type: web
    name: mediator-on-call
    runtime: python
    buildCommand: |
      python manage.py makemigrations --noinput
      python manage.py migrate --noinput
      python manage.py shell << 'PYEOF'
      from django.contrib.auth import get_user_model
      from disputes.models import Mediator
      User = get_user_model()
      # Create Frank Stanley if doesn't exist
      user, created = User.objects.get_or_create(
          username='frankstanley',
          defaults={
              'email': 'frank@probonomediation.co.za',
              'first_name': 'Frank',
              'last_name': 'Stanley',
              'is_staff': True,
              'is_superuser': False,
              'is_active': True,
          }
      )
      if created:
          user.set_password('FrankStanley2026!')
          user.save()
      Mediator.objects.get_or_create(user=user, defaults={'cell': '0821234567'})
      
      # Also ensure JVW exists
      jvw, jvw_created = User.objects.get_or_create(
          username='JVW',
          defaults={
              'email': 'jvw@probonomediation.co.za',
              'is_staff': True,
              'is_active': True,
          }
      )
      if jvw_created:
          jvw.set_password('JVW123')
          jvw.save()
      Mediator.objects.get_or_create(user=jvw, defaults={'cell': '0000000000'})
      print("Users ready")
      PYEOF
      python manage.py collectstatic --noinput --clear
    startCommand: gunicorn mediators_on_call.wsgi --bind 0.0.0.0:10000 --timeout 120 --workers 1
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.0"
      - key: DJANGO_SETTINGS_MODULE
        value: "mediators_on_call.settings"
      - key: PORT
        value: "10000"
      - key: DEBUG
        value: "False"
    # PostgreSQL database for persistent data
    database:
      name: mediator-db
      user: mediator_user

databases:
  - name: mediator-db
    databaseName: mediator_on_call
    user: mediator_user
    plan: free
