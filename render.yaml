services:
  - type: web
    name: mediator-on-call
    runtime: python
    buildCommand: |
      pip install -r requirements.txt
      python manage.py collectstatic --noinput --clear
    startCommand: |
      python manage.py migrate --noinput && bash start.sh
    healthCheckPath: /health/
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.0"
      - key: DJANGO_SETTINGS_MODULE
        value: "mediators_on_call.settings"
      - key: DEBUG
        value: "False"
      - key: DATABASE_URL
        fromDatabase:
          name: mediator-on-call-db
          property: connectionString

databases:
  - name: mediator-on-call-db
    databaseName: mediators_on_call
    user: mediators_on_call
    plan: free
